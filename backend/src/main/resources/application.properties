spring.application.name=hospital-system

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwt.secret=HospitalSystemSecretKey2024VeryLongSecretKeyForJWTSigning123456789
app.jwt.expiration=86400000

# Server
server.port=8080

# CORS
spring.mvc.cors.allowed-origins=http://localhost:3000

# Jackson - serialize dates as strings not arrays
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC

# Logging
logging.level.com.hospital=DEBUG
